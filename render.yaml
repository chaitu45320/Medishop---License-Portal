services:
  - type: web
    name: medishop-license-portal
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_SECRET
        value: MediShopAdmin2024
      - key: ADMIN_USERNAME
        value: MediShop
      - key: ADMIN_PASSWORD
        value: MediShop@2024
      - key: LICENSE_SECRET
        value: MS@MediShop#2024!PharmacyBilling$Key@Secure99
      - key: JWT_SECRET
        value: MS_JWT_MediShop_2024_Ultra_Secure_Key_99
      - key: TRIAL_DAYS
        value: "7"
      - key: MAX_DEVICES
        value: "1"
